<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transactions | Wells Fargo</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <style>
    :root {
      --primary: #b31b1b;
      --primary-light: #dc2626;
      --bg-color: #f3f4f6;
      --card-bg: #ffffff;
      --text-color: #111827;
      --text-secondary: #6b7280;
      --border-color: #e5e7eb;
      --success: #15803d;
      --danger: #b91c1c;
      --warning: #d97706;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    body.dark-mode {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-color: #f1f5f9;
      --text-secondary: #94a3b8;
      --border-color: #334155;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 12px rgba(179, 27, 27, 0.3);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateX(-2px);
    }

    header img {
      height: 32px;
      filter: brightness(0) invert(1);
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .toggle-btn, .filter-toggle {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 20px;
      font-size: 14px;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .toggle-btn:hover, .filter-toggle:hover {
      background: rgba(255,255,255,0.25);
    }

    /* Main Content */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Summary Cards */
    .summary-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .summary-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      transition: transform 0.3s;
    }

    .summary-card:hover {
      transform: translateY(-4px);
    }

    .summary-label {
      font-size: 13px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .summary-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-color);
    }

    .summary-value.positive {
      color: var(--success);
    }

    .summary-value.negative {
      color: var(--danger);
    }

    /* Search & Filter Bar */
    .controls-bar {
      background: var(--card-bg);
      padding: 16px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .search-box {
      position: relative;
      width: 100%;
    }

    .search-box input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 16px;
      background: var(--bg-color);
      color: var(--text-color);
      transition: all 0.3s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: var(--text-secondary);
    }

    .filter-chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .chip {
      padding: 8px 16px;
      border-radius: 20px;
      border: 2px solid var(--border-color);
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
      font-weight: 600;
    }

    .chip:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .date-filter {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .date-filter input {
      padding: 10px 14px;
      border: 2px solid var(--border-color);
      border-radius: 10px;
      font-size: 14px;
      background: var(--bg-color);
      color: var(--text-color);
    }

    /* Transactions List */
    .transactions-container {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .transaction-group {
      border-bottom: 1px solid var(--border-color);
    }

    .transaction-group:last-child {
      border-bottom: none;
    }

    .date-header {
      background: var(--bg-color);
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .date-total {
      font-size: 13px;
      color: var(--text-color);
    }

    .transaction-item {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.3s;
      border-bottom: 1px solid var(--border-color);
    }

    .transaction-item:last-child {
      border-bottom: none;
    }

    .transaction-item:hover {
      background: rgba(179, 27, 27, 0.03);
    }

    .transaction-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      transition: transform 0.3s;
    }

    .transaction-item:hover .transaction-icon {
      transform: scale(1.1);
    }

    .transaction-item.sent .transaction-icon {
      background: #fee2e2;
      color: var(--danger);
    }

    .transaction-item.received .transaction-icon {
      background: #dcfce7;
      color: var(--success);
    }

    .transaction-item.pending .transaction-icon {
      background: #fef3c7;
      color: var(--warning);
    }

    .transaction-details {
      flex: 1;
      min-width: 0;
    }

    .transaction-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .transaction-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }

    .transaction-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-sent {
      background: #fee2e2;
      color: var(--danger);
    }

    .badge-received {
      background: #dcfce7;
      color: var(--success);
    }

    .badge-pending {
      background: #fef3c7;
      color: var(--warning);
    }

    .transaction-amount {
      text-align: right;
      font-weight: 800;
      font-size: 18px;
    }

    .transaction-amount.sent {
      color: var(--danger);
    }

    .transaction-amount.received {
      color: var(--success);
    }

    .transaction-amount.pending {
      color: var(--warning);
    }

    .transaction-status {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-color);
      margin-bottom: 8px;
    }

    /* Loading State */
    .skeleton {
      background: linear-gradient(90deg, var(--border-color) 25%, var(--bg-color) 50%, var(--border-color) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-item {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .skeleton-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
    }

    .skeleton-text {
      height: 16px;
      flex: 1;
    }

    /* Transaction Detail Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--card-bg);
      border-radius: 20px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: modalSlide 0.3s ease-out;
    }

    @keyframes modalSlide {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .modal-close:hover {
      background: var(--bg-color);
    }

    .modal-body {
      padding: 24px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .detail-value {
      font-weight: 700;
      font-size: 14px;
      text-align: right;
    }

    .detail-amount-large {
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      margin: 24px 0;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--card-bg);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 16px;
      z-index: 100;
    }

    .nav-item {
      text-align: center;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 12px;
      transition: all 0.3s;
      font-weight: 600;
    }

    .nav-item:hover, .nav-item.active {
      color: var(--primary);
    }

    .nav-item.active {
      background: rgba(179, 27, 27, 0.1);
    }

    .nav-icon {
      width: 24px;
      height: 24px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1f2937;
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1001;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Export Button */
    .export-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 20px auto;
      transition: all 0.3s;
    }

    .export-btn:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(179, 27, 27, 0.3);
    }

    @media (max-width: 600px) {
      .summary-section {
        grid-template-columns: 1fr;
      }
      
      .date-filter {
        flex-direction: column;
        align-items: stretch;
      }
      
      .date-filter input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <button class="back-btn" onclick="history.back()">←</button>
      <img src="logo.png" alt="Wells Fargo" />
    </div>
    <div class="header-actions">
      <button class="filter-toggle" onclick="toggleFilters()">⚙️ Filters</button>
      <button class="toggle-btn" onclick="toggleDarkMode()">🌓</button>
    </div>
  </header>

  <main>
    <h2 class="page-title">📄 Transaction History</h2>

    <!-- Summary Cards -->
    <div class="summary-section">
      <div class="summary-card">
        <div class="summary-label">Total Sent</div>
        <div class="summary-value negative" id="totalSent">$0.00</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Total Received</div>
        <div class="summary-value positive" id="totalReceived">$0.00</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Net Flow</div>
        <div class="summary-value" id="netFlow">$0.00</div>
      </div>
    </div>

    <!-- Search & Filter Controls -->
    <div class="controls-bar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by name, amount, or date..." oninput="filterTransactions()">
      </div>
      
      <div class="filter-chips">
        <button class="chip active" onclick="setTypeFilter('all')">All</button>
        <button class="chip" onclick="setTypeFilter('sent')">Sent</button>
        <button class="chip" onclick="setTypeFilter('received')">Received</button>
        <button class="chip" onclick="setTypeFilter('pending')">Pending</button>
      </div>

      <div class="date-filter" id="dateFilter" style="display: none;">
        <input type="date" id="startDate" onchange="filterTransactions()">
        <span>to</span>
        <input type="date" id="endDate" onchange="filterTransactions()">
      </div>
    </div>

    <!-- Transactions List -->
    <div class="transactions-container" id="transactionsList">
      <div class="skeleton-item">
        <div class="skeleton skeleton-icon"></div>
        <div class="skeleton skeleton-text" style="width: 60%;"></div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton skeleton-icon"></div>
        <div class="skeleton skeleton-text" style="width: 80%;"></div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton skeleton-icon"></div>
        <div class="skeleton skeleton-text" style="width: 40%;"></div>
      </div>
    </div>

    <button class="export-btn" onclick="exportTransactions()">
      📥 Download Statement
    </button>
  </main>

  <!-- Transaction Detail Modal -->
  <div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 class="modal-title">Transaction Details</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Dynamic content -->
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      Home
    </a>
    <a href="transfer.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
        <polyline points="17 6 23 6 23 12"></polyline>
      </svg>
      Transfer
    </a>
    <a href="deposit.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2v20M2 12h20"></path>
      </svg>
      Deposit
    </a>
    <a href="explore.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 16v-4M12 8h.01"></path>
      </svg>
      Explore
    </a>
    <a href="settings.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 6.34L2.1 2.1m17.9 17.9l-4.24-4.24M6.34 17.66l-4.24 4.24"></path>
      </svg>
      Menu
    </a>
  </nav>

  <script>
    const BASE_URL = 'https://backend15-nnmy.onrender.com';
    const token = localStorage.getItem('userToken');
    
    if (!token) {
      showToast('Session expired. Please login again.');
      setTimeout(() => window.location.href = 'login.html', 2000);
    }

    let allTransactions = [];
    let currentFilter = 'all';
    let searchQuery = '';

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      fetchTransactions();
      setupDateInputs();
    });

    function setupDateInputs() {
      const today = new Date().toISOString().split('T')[0];
      const thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
      document.getElementById('endDate').value = today;
      document.getElementById('startDate').value = thirtyDaysAgo;
    }

    async function fetchTransactions() {
      try {
        const res = await fetch(`${BASE_URL}/api/transactions`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        const data = await res.json();
        
        if (!res.ok) throw new Error(data.message || 'Failed to load');

        // Normalize data structure
        allTransactions = [];
        
        if (data.sent) {
          data.sent.forEach(tx => {
            allTransactions.push({
              ...tx,
              type: 'sent',
              otherParty: tx.toUser?.name || tx.to,
              amount: Math.abs(parseFloat(tx.amount))
            });
          });
        }
        
        if (data.received) {
          data.received.forEach(tx => {
            allTransactions.push({
              ...tx,
              type: 'received',
              otherParty: tx.fromUser?.name || tx.from,
              amount: Math.abs(parseFloat(tx.amount))
            });
          });
        }

        // Sort by date descending
        allTransactions.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        
        updateSummary();
        renderTransactions();
      } catch (error) {
        console.error('Fetch error:', error);
        document.getElementById('transactionsList').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div class="empty-title">Failed to load transactions</div>
            <p>Please check your connection and try again</p>
          </div>
        `;
        showToast('Error loading transactions');
      }
    }

    function updateSummary() {
      let sent = 0, received = 0;
      
      allTransactions.forEach(tx => {
        if (tx.type === 'sent') sent += tx.amount;
        else if (tx.type === 'received') received += tx.amount;
      });

      document.getElementById('totalSent').textContent = formatCurrency(sent);
      document.getElementById('totalReceived').textContent = formatCurrency(received);
      
      const net = received - sent;
      const netEl = document.getElementById('netFlow');
      netEl.textContent = formatCurrency(Math.abs(net));
      netEl.className = 'summary-value ' + (net >= 0 ? 'positive' : 'negative');
    }

    function renderTransactions() {
      const container = document.getElementById('transactionsList');
      
      // Filter transactions
      let filtered = allTransactions.filter(tx => {
        // Type filter
        if (currentFilter !== 'all' && tx.type !== currentFilter) return false;
        
        // Search filter
        if (searchQuery) {
          const query = searchQuery.toLowerCase();
          const matchName = tx.otherParty?.toLowerCase().includes(query);
          const matchAmount = tx.amount.toString().includes(query);
          const matchDate = new Date(tx.timestamp).toLocaleDateString().toLowerCase().includes(query);
          if (!matchName && !matchAmount && !matchDate) return false;
        }
        
        // Date range filter
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const txDate = new Date(tx.timestamp);
        if (startDate && txDate < new Date(startDate)) return false;
        if (endDate && txDate > new Date(endDate + 'T23:59:59')) return false;
        
        return true;
      });

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-title">No transactions found</div>
            <p>Try adjusting your filters or search query</p>
          </div>
        `;
        return;
      }

      // Group by date
      const grouped = groupByDate(filtered);
      
      container.innerHTML = '';
      
      Object.entries(grouped).forEach(([date, transactions]) => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'transaction-group';
        
        // Calculate daily total
        const dailyTotal = transactions.reduce((sum, tx) => {
          return sum + (tx.type === 'received' ? tx.amount : -tx.amount);
        }, 0);
        
        const dateHeader = document.createElement('div');
        dateHeader.className = 'date-header';
        dateHeader.innerHTML = `
          <span>${formatDateHeader(date)}</span>
          <span class="date-total">${dailyTotal >= 0 ? '+' : ''}${formatCurrency(dailyTotal)}</span>
        `;
        groupDiv.appendChild(dateHeader);
        
        transactions.forEach(tx => {
          const item = createTransactionElement(tx);
          groupDiv.appendChild(item);
        });
        
        container.appendChild(groupDiv);
      });
    }

    function groupByDate(transactions) {
      return transactions.reduce((groups, tx) => {
        const date = new Date(tx.timestamp).toDateString();
        if (!groups[date]) groups[date] = [];
        groups[date].push(tx);
        return groups;
      }, {});
    }

    function createTransactionElement(tx) {
      const div = document.createElement('div');
      div.className = `transaction-item ${tx.type}`;
      div.onclick = () => showDetail(tx);
      
      const icon = tx.type === 'sent' ? '↑' : tx.type === 'received' ? '↓' : '⏳';
      const sign = tx.type === 'sent' ? '-' : '+';
      
      div.innerHTML = `
        <div class="transaction-icon">${icon}</div>
        <div class="transaction-details">
          <div class="transaction-title">${tx.otherParty || 'Unknown'}</div>
          <div class="transaction-meta">
            <span class="transaction-badge badge-${tx.type}">${tx.type}</span>
            <span>•</span>
            <span>${new Date(tx.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
            ${tx.status ? `<span>•</span><span>${tx.status}</span>` : ''}
          </div>
        </div>
        <div>
          <div class="transaction-amount ${tx.type}">${sign}${formatCurrency(tx.amount)}</div>
          ${tx.status === 'pending' ? '<div class="transaction-status">Processing...</div>' : ''}
        </div>
      `;
      
      return div;
    }

    function showDetail(tx) {
      const modal = document.getElementById('detailModal');
      const body = document.getElementById('modalBody');
      
      const sign = tx.type === 'sent' ? '-' : '+';
      const color = tx.type === 'sent' ? 'var(--danger)' : 'var(--success)';
      
      body.innerHTML = `
        <div class="detail-amount-large" style="color: ${color};">${sign}${formatCurrency(tx.amount)}</div>
        
        <div class="detail-row">
          <span class="detail-label">Status</span>
          <span class="detail-value" style="text-transform: capitalize;">${tx.status || 'Completed'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Type</span>
          <span class="detail-value" style="text-transform: capitalize;">${tx.type}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">${tx.type === 'sent' ? 'To' : 'From'}</span>
          <span class="detail-value">${tx.otherParty}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Date</span>
          <span class="detail-value">${new Date(tx.timestamp).toLocaleString()}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Transaction ID</span>
          <span class="detail-value" style="font-family: monospace; font-size: 12px;">${tx.id || 'N/A'}</span>
        </div>
        ${tx.memo ? `
        <div class="detail-row">
          <span class="detail-label">Memo</span>
          <span class="detail-value">${tx.memo}</span>
        </div>
        ` : ''}
        ${tx.category ? `
        <div class="detail-row">
          <span class="detail-label">Category</span>
          <span class="detail-value">${tx.category}</span>
        </div>
        ` : ''}
      `;
      
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(event) {
      if (!event || event.target.id === 'detailModal' || event.target.classList.contains('modal-close')) {
        document.getElementById('detailModal').classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    function setTypeFilter(type) {
      currentFilter = type;
      document.querySelectorAll('.chip').forEach(chip => chip.classList.remove('active'));
      event.target.classList.add('active');
      renderTransactions();
    }

    function filterTransactions() {
      searchQuery = document.getElementById('searchInput').value;
      renderTransactions();
    }

    function toggleFilters() {
      const dateFilter = document.getElementById('dateFilter');
      dateFilter.style.display = dateFilter.style.display === 'none' ? 'flex' : 'none';
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }

    function formatCurrency(amount) {
      return parseFloat(amount).toLocaleString('en-US', {
        style: 'currency',
        currency: 'USD'
      });
    }

    function formatDateHeader(dateStr) {
      const date = new Date(dateStr);
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      
      if (date.toDateString() === today.toDateString()) return 'Today';
      if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
      
      return date.toLocaleDateString('en-US', { 
        weekday: 'long', 
        month: 'short', 
        day: 'numeric' 
      });
    }

    function exportTransactions() {
      const csvContent = [
        ['Date', 'Type', 'Name', 'Amount', 'Status'].join(','),
        ...allTransactions.map(tx => [
          new Date(tx.timestamp).toLocaleString(),
          tx.type,
          tx.otherParty,
          tx.amount,
          tx.status || 'Completed'
        ].join(','))
      ].join('\n');

      const blob = new Blob([csvContent], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `transactions_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      
      showToast('Statement downloaded successfully');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Check for saved dark mode preference
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark-mode');
    }

    // Close modal on escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
